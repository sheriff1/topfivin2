name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Railway backend deployment
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_BACKEND }}"

  deploy-frontend:
    name: Build & Deploy Frontend to Railway
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Trigger Railway frontend deployment
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_FRONTEND }}"
