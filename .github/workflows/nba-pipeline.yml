name: NBA Data Pipeline (Derive & Rank)

on:
  workflow_dispatch:
  schedule:
    # Run daily at 10:00 AM UTC (after local fetch completes)
    # NOTE: Fetch now runs locally via cron — this job only derives & ranks pre-fetched data
    - cron: "0 10 * * *"

jobs:
  derive-and-rank:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # REMOVED: "Fetch NBA stats" step
      # Fetch now runs locally on residential IP via macOS cron to bypass hard IP blocks from stats.nba.com
      # See: https://github.com/sheriff1/topfivin2/issues/33

      - name: Derive team stats (uses pre-fetched data)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        run: python scripts/derive_team_stats.py

      - name: Derive rankings and clear cache
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        run: python scripts/derive_rankings.py
